name: SonarQube Cloud Advisory

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  advisory-scan:
    name: Advisory static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_CONFIGURED: ${{ secrets.SONAR_TOKEN != '' && vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != '' }}

    steps:
      - name: Report setup pending
        if: ${{ env.SONAR_CONFIGURED != 'true' }}
        run: |
          echo "::notice::Skipping SonarQube Cloud advisory scan until SONAR_TOKEN, SONAR_PROJECT_KEY, and SONAR_ORGANIZATION are configured."

      - name: Check out repository
        if: ${{ env.SONAR_CONFIGURED == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        if: ${{ env.SONAR_CONFIGURED == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ env.SONAR_CONFIGURED == 'true' }}
        run: npm ci

      - name: Generate coverage
        if: ${{ env.SONAR_CONFIGURED == 'true' }}
        run: npm run test:coverage

      - name: Run SonarQube Cloud scan
        id: sonar_scan
        if: ${{ env.SONAR_CONFIGURED == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v7
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}

      - name: Report advisory scan failure
        if: ${{ env.SONAR_CONFIGURED == 'true' && steps.sonar_scan.outcome == 'failure' }}
        run: |
          echo "::warning::SonarQube Cloud advisory scan failed. This rollout is reporting-only; inspect the workflow logs and SonarQube Cloud project before enforcing any quality gate."
